function render() {
    let html = "";
    data.forEach((item, index) => {
        html += `
        <div class="model">
            <h2>${item.model}</h2>
            <div class="top">
                <img src="${item.image}" alt="${item.model}">
                <div class="info">
                    <b>📖 Giới thiệu:</b>
                    <p>${item.intro}</p>
                    <div class="accessories">
                        <b>🧰 Phụ kiện đi kèm:</b>
                        <ul>${item.accessories.map(a => `<li>${a}</li>`).join("")}</ul>
                    </div>
                </div>
            </div>
        `;

        item.reviews.forEach(r => {
            html += `
            <div class="review">
                <div class="user">${r.user}</div>
                <div class="stars">${"★".repeat(r.star)}</div>
                <p>${r.text}</p>
            </div>
            `;
        });

        // Form ghi đánh giá
        html += `
        <div class="review-form">
            <h3>✍️ Viết đánh giá của bạn</h3>
            <input type="text"
            <select id="star-${index}">
                <option value="5">★★★★★ (5 sao)</option>
                <option value="4">★★★★☆ (4 sao)</option>
                <option value="3">★★★☆☆ (3 sao)</option>
                <option value="2">★★☆☆☆ (2 sao)</option>
                <option value="1">★☆☆☆☆ (1 sao)</option>
            </select>
            <textarea id="text-${index}" placeholder="Nội dung đánh giá..." required></textarea>
            <button onclick="addReview(${index})">Gửi đánh giá</button>
        </div>
        </div>
        `;
    });
    document.getElementById("content").innerHTML = html;
}

function addReview(index) {
    const star = parseInt(document.getElementById(`star-${index}`).value);
    const text = document.getElementById(`text-${index}`).value;

        render(); // render lại để hiển thị review mới

    const savedUser = localStorage.getItem("user") || "Ẩn danh";

    }
}
